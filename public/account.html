<link rel="stylesheet" href="account.css">

</head>

<body>


<header>
    
<div class="logo">GardenPal</div>

<nav>
<button class="navBtn" data-page="live">Live Feed</button>
<button class="navBtn" data-page="myplants">My Plants</button>
<button class="navBtn" data-page="weather">Weather</button>
</nav>

<div class="profile"><button class="navBtn" data-page="profile" 
style="background: transparent; 
border: none; 
font-size: 22px;
cursor: pointer;">👤</button></div>
</header>


<section class="profile-wrapper">

<div class="profile-container">

<div class="profile-avatar">👤</div>

<h2 class="username" id="fullname"></h2>


<div class="profile-card">

<div class="row">
<span class="label" style="text-align: center;">Username: admin</span>
<span class="value" id="username"></span>
</div>

<div class="row">
<span class="label" style="text-align: center;">Email: admin@scarletmail.rutgers.edu</span>
<span class="value" id="email"></span>
</div>

<div class="row">
<span class="label" style="text-align: center;">Plant Count: 6</span>
<span class="value" id="plants"> </span>
</div>

<div class="row">
<span class="label" style="text-align: center;">Location: New Brunswick, New Jersey</span>
<span class="value" id="location"></span>
</div>

<div class="links">
<a href="#">Change Password</a>
<a href="#">Change Email</a>
</div>

</div>

</div>

</section>

</body>
<script>
    const routes = {
        live: "live-feed.html",
        myplants: "myplants.html",
        weather: "weather.html",
        profile: "account.html"
    };
    document.querySelectorAll(".navBtn").forEach(btn =>{
        btn.addEventListener("click", () =>{
            const page = btn.dataset.page;
            window.location.href = routes[page];
        });
    });
</script>

<script>
    const currentPage = window.location.pathname.split("/").pop().replace(".html", "");

    document.querySelectorAll(".navBtn").forEach(btn => {
        if (btn.dataset.page === currentPage){
            btn.classList.add("active");
        }
    });
</script>
</html>
