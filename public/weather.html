<!DOCTYPE html>
<html>
<head>
    <title>Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="weather.css">
</head>

<body>
<header>
    
    <div class="logo">GardenPal</div>

    <nav>
        <button class="navBtn" data-page="live">Live Feed</button>
        <button class="navBtn" data-page="myplants">My Plants</button>
        <button class="navBtn active" data-page="weather">Weather</button>
    </nav>

    <div class="profile"><button class="navBtn" data-page="profile" 
        style="background: transparent; 
        border: none; 
        font-size: 22px;
        cursor: pointer;">👤</button></div>
</header>

<main>
    <div class="website-design-card">
        <div class="weather-title">
            <p class="weather-report-text">Weather Report</p>
        </div>

        <div class="line-2-weather-box"></div>

        <div class="top-section">
            <div class="today-card">
                <div class="today-title-card">
                    <div class="today-title" id="today-title">Today, <span id="today-month">Feb</span> <span id="today-day-num">2nd</span></div>
                </div>
                
                <div class="today-main">
                    <div class="today-img" id="today-img">☀</div>
                    <div class="today-temp"><span id="today-temp"></span>°F</div>
                </div>

                <div class="today-report-box">
                    <div class="line-border"></div>
                    <div class="today-report-text">
                        <h3 style="color: #2D5B42;"><span id="today-day">Monday</span>'s Weather Report</h3>
                        <p style="text-align: center; color: #2D5B42;"><strong>Precipitation:</strong> <span id = "today-precip">10</span>%</p>
                        <p style="text-align: center; color: #2D5B42;"><strong>Humidity:</strong> <span id = "today-humid">76</span>%</p>
                        <p style="text-align: center; color: #2D5B42;"><strong>Wind:</strong> <span id = "today-wind">0 mph</span></p>
                        <p style="text-align: center; color: #2D5B42;"><span id = "today-report">Low Rain and High Wind Levels</span></p>
                    </div>
                </div>
            </div>
        
            <div class="precip-card">
                <div class="precip-title-card">
                    <div class="precip-title">Precipitation Graph</div>
                </div>
                <div class="precip-img"></div>
            </div>
        </div>
    
        <div class=weekly-weather>
            <div class="day-card">
                <p class="day-title" id="day-1-title">Tue</p>
                <div class="day-1-img" id="day-1-img"></div>
                <p class="day-report" id="day-1-report">Sunny</p>
                <p class="day-temp"><span id="day-1-temp">16</span>°F</p>
            </div>
            <div class="day-card">
                <p class="day-title" id="day-2-title">Tue</p>
                <div class="day-2-img" id="day-2-img"></div>
                <p class="day-report" id="day-2-report">Sunny</p>
                <p class="day-temp"><span id="day-2-temp">16</span>°F</p>
            </div>
            <div class="day-card">
                <p class="day-title" id="day-3-title">Tue</p>
                <div class="day-3-img" id="day-3-img"></div>
                <p class="day-report" id="day-3-report">Sunny</p>
                <p class="day-temp"><span id="day-3-temp">16</span>°F</p>
            </div>
            <div class="day-card">
                <p class="day-title" id="day-4-title">Tue</p>
                <div class="day-4-img" id="day-4-img"></div>
                <p class="day-report" id="day-4-report">Sunny</p>
                <p class="day-temp"><span id="day-4-temp">16</span>°F</p>
            </div>
            <div class="day-card">
                <p class="day-title" id="day-5-title">Tue</p>
                <div class="day-5-img" id="day-5-img"></div>
                <p class="day-report" id="day-5-report">Sunny</p>
                <p class="day-temp"><span id="day-5-temp">16</span>°F</p>
            </div>
        </div>
    </div>
</main>
<div class="footer-strip"></div>
<script src="weather.js"></script>

<script>
    const routes = {
        live: "live-feed.html",
        myplants: "myplants.html",
        weather: "weather.html",
        profile: "account.html"
    };
    document.querySelectorAll(".navBtn").forEach(btn =>{
        btn.addEventListener("click", () =>{
            const page = btn.dataset.page;
            window.location.href = routes[page];
        });
    });
</script>

<script>
    const currentPage = window.location.pathname.split("/").pop().replace(".html", "");

    document.querySelectorAll(".navBtn").forEach(btn => {
        if (btn.dataset.page === currentPage){
            btn.classList.add("active");
        }
    });
</script>
</body>
</html>
